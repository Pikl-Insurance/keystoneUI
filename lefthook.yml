pre-commit:
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,md,mjs}"
      run: pnpm oxfmt --check {staged_files}
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      exclude: ["next-env.d.ts"]
      run: pnpm oxlint {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
    build:
      run: pnpm build
